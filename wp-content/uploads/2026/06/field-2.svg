<svg xmlns="http://www.w3.org/2000/svg" width="740" height="920" viewBox="0 0 740 920">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="50%" stop-color="#0D2B52"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cityGlow" cx="55%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Night sky background -->
  <rect width="740" height="920" fill="url(#sky2)"/>

  <!-- Stars -->
  <g fill="#FFFFFF" opacity="0.5">
    <circle cx="60" cy="50" r="1.2"/><circle cx="120" cy="30" r="0.8"/><circle cx="200" cy="70" r="1"/><circle cx="280" cy="20" r="1.3"/>
    <circle cx="350" cy="55" r="0.9"/><circle cx="440" cy="35" r="1.1"/><circle cx="520" cy="15" r="0.7"/><circle cx="600" cy="60" r="1.2"/>
    <circle cx="680" cy="40" r="0.9"/><circle cx="90" cy="100" r="0.8"/><circle cx="170" cy="130" r="1"/><circle cx="650" cy="90" r="0.7"/>
    <circle cx="720" cy="120" r="1.1"/><circle cx="30" cy="150" r="0.9"/><circle cx="400" cy="100" r="0.8"/>
  </g>

  <!-- City skyline (background buildings) -->
  <g fill="#1E3A5F" opacity="0.8">
    <!-- Tall building left -->
    <rect x="30" y="320" width="55" height="340"/>
    <rect x="40" y="295" width="35" height="30"/>
    <!-- Windows left building -->
    <g fill="#F59E0B" opacity="0.6">
      <rect x="38" y="330" width="10" height="14"/><rect x="55" y="330" width="10" height="14"/><rect x="72" y="330" width="10" height="14"/>
      <rect x="38" y="358" width="10" height="14"/><rect x="72" y="358" width="10" height="14"/>
      <rect x="38" y="386" width="10" height="14"/><rect x="55" y="386" width="10" height="14"/>
      <rect x="55" y="414" width="10" height="14"/><rect x="72" y="414" width="10" height="14"/>
      <rect x="38" y="442" width="10" height="14"/><rect x="55" y="442" width="10" height="14"/>
    </g>
    <!-- Mid building 1 -->
    <rect x="100" y="380" width="70" height="280"/>
    <g fill="#60A5FA" opacity="0.35">
      <rect x="108" y="390" width="12" height="18"/><rect x="126" y="390" width="12" height="18"/><rect x="144" y="390" width="12" height="18"/>
      <rect x="108" y="418" width="12" height="18"/><rect x="144" y="418" width="12" height="18"/>
      <rect x="126" y="446" width="12" height="18"/><rect x="144" y="446" width="12" height="18"/>
    </g>
    <!-- Tall center-left building -->
    <rect x="185" y="250" width="80" height="410"/>
    <rect x="200" y="220" width="50" height="35"/>
    <!-- Antenna -->
    <line x1="225" y1="160" x2="225" y2="220" stroke="#2563EB" stroke-width="3"/>
    <circle cx="225" cy="158" r="5" fill="#F97316" opacity="0.9"/>
    <g fill="#F59E0B" opacity="0.5">
      <rect x="192" y="262" width="14" height="20"/><rect x="212" y="262" width="14" height="20"/><rect x="232" y="262" width="14" height="20"/>
      <rect x="192" y="294" width="14" height="20"/><rect x="232" y="294" width="14" height="20"/>
      <rect x="212" y="326" width="14" height="20"/><rect x="192" y="358" width="14" height="20"/>
      <rect x="232" y="390" width="14" height="20"/><rect x="212" y="422" width="14" height="20"/>
    </g>
    <!-- Buildings right side -->
    <rect x="480" y="350" width="65" height="310"/>
    <g fill="#60A5FA" opacity="0.35">
      <rect x="488" y="360" width="10" height="16"/><rect x="504" y="360" width="10" height="16"/><rect x="520" y="360" width="10" height="16"/>
      <rect x="488" y="388" width="10" height="16"/><rect x="520" y="388" width="10" height="16"/>
      <rect x="504" y="416" width="10" height="16"/>
    </g>
    <rect x="558" y="290" width="90" height="370"/>
    <rect x="572" y="260" width="62" height="35"/>
    <line x1="603" y1="200" x2="603" y2="260" stroke="#2563EB" stroke-width="3"/>
    <circle cx="603" cy="198" r="5" fill="#F97316" opacity="0.9"/>
    <g fill="#F59E0B" opacity="0.45">
      <rect x="566" y="300" width="12" height="18"/><rect x="584" y="300" width="12" height="18"/><rect x="602" y="300" width="12" height="18"/><rect x="620" y="300" width="12" height="18"/>
      <rect x="566" y="330" width="12" height="18"/><rect x="620" y="330" width="12" height="18"/>
      <rect x="584" y="360" width="12" height="18"/><rect x="566" y="390" width="12" height="18"/>
      <rect x="602" y="420" width="12" height="18"/><rect x="620" y="360" width="12" height="18"/>
    </g>
    <rect x="660" y="400" width="80" height="260"/>
    <g fill="#60A5FA" opacity="0.35">
      <rect x="668" y="410" width="12" height="18"/><rect x="686" y="410" width="12" height="18"/><rect x="704" y="410" width="12" height="18"/>
      <rect x="668" y="440" width="12" height="18"/><rect x="704" y="440" width="12" height="18"/>
    </g>
  </g>

  <!-- City glow -->
  <rect x="0" y="280" width="740" height="200" fill="url(#cityGlow)"/>

  <!-- Road / ground reflection -->
  <rect x="0" y="650" width="740" height="270" fill="#0A1628"/>
  <g opacity="0.25">
    <line x1="370" y1="660" x2="370" y2="920" stroke="#FBBF24" stroke-width="3" stroke-dasharray="20,15"/>
    <line x1="200" y1="660" x2="100" y2="920" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="15,12"/>
    <line x1="540" y1="660" x2="640" y2="920" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="15,12"/>
  </g>

  <!-- Construction worker silhouette -->
  <g transform="translate(200, 400)" fill="#0D1F35">
    <!-- Body -->
    <ellipse cx="80" cy="220" rx="42" ry="55" fill="#0D1F35"/>
    <!-- Head -->
    <circle cx="80" cy="148" r="30" fill="#0D1F35"/>
    <!-- Hard hat -->
    <path d="M50 148 Q55 110 80 108 Q105 110 110 148 Z" fill="#F59E0B" opacity="0.9"/>
    <rect x="46" y="145" width="68" height="10" rx="3" fill="#F59E0B" opacity="0.9"/>
    <!-- Arms -->
    <path d="M42 225 Q10 260 20 310" stroke="#0D1F35" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M118 225 Q155 250 160 230" stroke="#0D1F35" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- Tablet/device in hand -->
    <rect x="148" y="215" width="50" height="38" rx="4" fill="#1E3A5F"/>
    <rect x="151" y="218" width="44" height="32" rx="2" fill="#3B82F6" opacity="0.7"/>
    <line x1="157" y1="226" x2="189" y2="226" stroke="#93C5FD" stroke-width="1.5"/>
    <line x1="157" y1="233" x2="185" y2="233" stroke="#93C5FD" stroke-width="1.5"/>
    <line x1="157" y1="240" x2="180" y2="240" stroke="#93C5FD" stroke-width="1.5"/>
    <!-- Legs -->
    <rect x="55" y="265" width="22" height="70" rx="8" fill="#0D1F35"/>
    <rect x="83" y="265" width="22" height="70" rx="8" fill="#0D1F35"/>
  </g>

  <!-- Orange glow from city lights -->
  <radialGradient id="orangeGlow" cx="50%" cy="70%" r="50%">
    <stop offset="0%" stop-color="#F97316" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
  </radialGradient>
  <rect width="740" height="920" fill="url(#orangeGlow)"/>

  <!-- Vignette -->
  <radialGradient id="vig2" cx="50%" cy="50%" r="70%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="740" height="920" fill="url(#vig2)"/>
</svg>
