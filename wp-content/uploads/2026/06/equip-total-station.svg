<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" fill="none">
  <!-- Tripod legs -->
  <line x1="80" y1="105" x2="30" y2="160" stroke="#0379CC" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="105" x2="80" y2="165" stroke="#0379CC" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="105" x2="130" y2="160" stroke="#0379CC" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Feet -->
  <circle cx="30" cy="162" r="5" fill="#0379CC"/>
  <circle cx="80" cy="167" r="5" fill="#0379CC"/>
  <circle cx="130" cy="162" r="5" fill="#0379CC"/>
  <!-- Tripod head -->
  <ellipse cx="80" cy="103" rx="22" ry="6" fill="#015A99"/>
  <!-- Body -->
  <rect x="58" y="64" width="44" height="36" rx="6" fill="#0379CC"/>
  <rect x="62" y="68" width="20" height="14" rx="3" fill="#C8E6FA"/>
  <!-- Telescope arm -->
  <rect x="100" y="72" width="26" height="10" rx="4" fill="#015A99"/>
  <circle cx="128" cy="77" r="6.5" fill="#E0F4FF" stroke="#015A99" stroke-width="1.5"/>
  <circle cx="128" cy="77" r="3" fill="#0379CC"/>
  <!-- Vertical axis -->
  <line x1="80" y1="64" x2="80" y2="48" stroke="#015A99" stroke-width="2.5"/>
  <circle cx="80" cy="45" r="4" fill="#0379CC"/>
  <!-- Level bubble indicator -->
  <circle cx="70" cy="84" r="4" fill="none" stroke="#E0F4FF" stroke-width="1.5"/>
  <circle cx="70" cy="84" r="1.5" fill="#E0F4FF"/>
</svg>
