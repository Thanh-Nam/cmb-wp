<svg xmlns="http://www.w3.org/2000/svg" width="740" height="920" viewBox="0 0 740 920">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2F4A"/>
      <stop offset="60%" stop-color="#243B55"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFF"/>
      <stop offset="100%" stop-color="#E8F0FE"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3728"/>
      <stop offset="100%" stop-color="#2C1F15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="740" height="920" fill="url(#bg3)"/>

  <!-- Subtle dot pattern -->
  <g fill="#3B6FA0" opacity="0.12">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/><circle cx="320" cy="80" r="2"/>
    <circle cx="400" cy="80" r="2"/><circle cx="480" cy="80" r="2"/><circle cx="560" cy="80" r="2"/><circle cx="640" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="240" cy="160" r="2"/><circle cx="320" cy="160" r="2"/>
    <circle cx="400" cy="160" r="2"/><circle cx="480" cy="160" r="2"/><circle cx="560" cy="160" r="2"/><circle cx="640" cy="160" r="2"/>
    <circle cx="80" cy="240" r="2"/><circle cx="160" cy="240" r="2"/><circle cx="240" cy="240" r="2"/><circle cx="320" cy="240" r="2"/>
    <circle cx="400" cy="240" r="2"/><circle cx="480" cy="240" r="2"/><circle cx="560" cy="240" r="2"/><circle cx="640" cy="240" r="2"/>
  </g>

  <!-- Desk surface -->
  <rect x="0" y="560" width="740" height="360" fill="url(#deskGrad)"/>
  <rect x="0" y="558" width="740" height="8" fill="#5C4033"/>

  <!-- Main document stack -->
  <!-- Bottom paper (offset) -->
  <rect x="160" y="230" width="380" height="490" rx="6" fill="#E8F0FE" transform="rotate(-4, 350, 475)"/>
  <!-- Middle paper -->
  <rect x="160" y="220" width="380" height="490" rx="6" fill="#F0F5FF" transform="rotate(2, 350, 465)"/>
  <!-- Top paper (main) -->
  <g transform="rotate(-1, 350, 455)">
    <rect x="165" y="205" width="390" height="500" rx="6" fill="url(#paperGrad)"/>

    <!-- Paper content: Header bar -->
    <rect x="165" y="205" width="390" height="52" rx="6" fill="#0379CC"/>
    <rect x="165" y="238" width="390" height="19" fill="#0379CC"/>

    <!-- Logo placeholder on header -->
    <rect x="182" y="216" width="70" height="28" rx="3" fill="rgba(255,255,255,0.25)"/>
    <text x="217" y="234" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="bold">CMB</text>

    <!-- Header title -->
    <text x="380" y="230" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="bold">BÁO CÁO NGHIÊN CỨU KHẢ THI</text>
    <text x="380" y="248" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10" font-family="sans-serif">DỰ ÁN ĐẦU TƯ XÂY DỰNG CÔNG TRÌNH CẢNG BIỂN</text>

    <!-- Section headings and lines -->
    <text x="190" y="282" fill="#0379CC" font-size="10" font-family="sans-serif" font-weight="bold">1. MỤC TIÊU DỰ ÁN</text>
    <line x1="190" y1="290" x2="540" y2="290" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="190" y="298" width="310" height="7" rx="2" fill="#CBD5E1"/>
    <rect x="190" y="310" width="280" height="7" rx="2" fill="#CBD5E1"/>
    <rect x="190" y="322" width="300" height="7" rx="2" fill="#CBD5E1"/>

    <text x="190" y="348" fill="#0379CC" font-size="10" font-family="sans-serif" font-weight="bold">2. PHÂN TÍCH THỊ TRƯỜNG</text>
    <line x1="190" y1="356" x2="540" y2="356" stroke="#CBD5E1" stroke-width="1"/>

    <!-- Mini bar chart -->
    <g transform="translate(190, 365)">
      <rect x="0" y="50" width="28" height="50" rx="2" fill="#0379CC" opacity="0.7"/>
      <rect x="36" y="30" width="28" height="70" rx="2" fill="#0379CC" opacity="0.85"/>
      <rect x="72" y="15" width="28" height="85" rx="2" fill="#0379CC"/>
      <rect x="108" y="35" width="28" height="65" rx="2" fill="#E8465F" opacity="0.85"/>
      <rect x="144" y="25" width="28" height="75" rx="2" fill="#0379CC" opacity="0.9"/>
      <line x1="0" y1="102" x2="175" y2="102" stroke="#94A3B8" stroke-width="1"/>
    </g>

    <text x="190" y="490" fill="#0379CC" font-size="10" font-family="sans-serif" font-weight="bold">3. ĐÁNH GIÁ HIỆU QUẢ ĐẦU TƯ</text>
    <line x1="190" y1="498" x2="540" y2="498" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="190" y="506" width="290" height="7" rx="2" fill="#CBD5E1"/>
    <rect x="190" y="518" width="260" height="7" rx="2" fill="#CBD5E1"/>

    <!-- Pie chart placeholder -->
    <circle cx="490" cy="430" r="42" fill="none" stroke="#CBD5E1" stroke-width="1"/>
    <path d="M490 388 A42 42 0 0 1 524 460 L490 430 Z" fill="#0379CC" opacity="0.85"/>
    <path d="M524 460 A42 42 0 0 1 458 460 L490 430 Z" fill="#E8465F" opacity="0.7"/>
    <path d="M458 460 A42 42 0 0 1 490 388 L490 430 Z" fill="#64748B" opacity="0.5"/>

    <!-- Signature line -->
    <line x1="340" y1="670" x2="520" y2="670" stroke="#94A3B8" stroke-width="1"/>
    <text x="430" y="685" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="sans-serif">Chữ ký xác nhận</text>

    <!-- Page number -->
    <text x="540" y="692" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="sans-serif">Trang 1 / 48</text>
  </g>

  <!-- Hand reaching to document (right side) -->
  <g transform="translate(440, 480)" opacity="0.85">
    <!-- Forearm and hand -->
    <path d="M220 300 Q200 240 160 200 Q130 170 100 180 Q70 190 80 220 Q90 250 120 260 Q150 270 160 300 Z" fill="#C8956B"/>
    <!-- Fingers -->
    <path d="M80 215 Q40 190 30 160 Q25 140 45 138 Q60 140 70 165 Q80 190 80 215" fill="#C8956B"/>
    <path d="M82 230 Q38 215 22 187 Q14 165 34 158 Q50 155 62 178 Q76 205 82 230" fill="#BF8A60"/>
    <path d="M88 245 Q46 238 34 212 Q26 192 44 184 Q60 180 72 202 Q84 224 88 245" fill="#C8956B"/>
    <!-- Pen -->
    <rect x="45" y="130" width="8" height="60" rx="3" fill="#1E293B" transform="rotate(20, 49, 160)"/>
    <polygon points="45,188 53,188 49,202" fill="#E8465F" transform="rotate(20, 49, 160)"/>
    <rect x="45" y="128" width="8" height="12" rx="1" fill="#CBD5E1" transform="rotate(20, 49, 160)"/>
  </g>

  <!-- Ruler on desk -->
  <rect x="100" y="572" width="500" height="18" rx="3" fill="#F8FAFF" opacity="0.6"/>
  <g stroke="#94A3B8" stroke-width="0.8" opacity="0.5">
    <line x1="120" y1="572" x2="120" y2="580"/>
    <line x1="140" y1="572" x2="140" y2="584"/>
    <line x1="160" y1="572" x2="160" y2="580"/>
    <line x1="180" y1="572" x2="180" y2="580"/>
    <line x1="200" y1="572" x2="200" y2="584"/>
    <line x1="220" y1="572" x2="220" y2="580"/>
    <line x1="240" y1="572" x2="240" y2="580"/>
    <line x1="260" y1="572" x2="260" y2="584"/>
    <line x1="280" y1="572" x2="280" y2="580"/>
    <line x1="300" y1="572" x2="300" y2="580"/>
    <line x1="320" y1="572" x2="320" y2="584"/>
    <line x1="340" y1="572" x2="340" y2="580"/>
    <line x1="360" y1="572" x2="360" y2="580"/>
    <line x1="380" y1="572" x2="380" y2="584"/>
    <line x1="400" y1="572" x2="400" y2="580"/>
    <line x1="420" y1="572" x2="420" y2="580"/>
    <line x1="440" y1="572" x2="440" y2="584"/>
    <line x1="460" y1="572" x2="460" y2="580"/>
    <line x1="480" y1="572" x2="480" y2="580"/>
    <line x1="500" y1="572" x2="500" y2="584"/>
    <line x1="520" y1="572" x2="520" y2="580"/>
    <line x1="540" y1="572" x2="540" y2="580"/>
    <line x1="560" y1="572" x2="560" y2="584"/>
    <line x1="580" y1="572" x2="580" y2="580"/>
  </g>

  <!-- Vignette -->
  <radialGradient id="vig3" cx="50%" cy="50%" r="70%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
  </radialGradient>
  <rect width="740" height="920" fill="url(#vig3)"/>
</svg>
