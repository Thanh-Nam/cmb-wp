<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 260" width="196" height="260">
  <defs>
    <linearGradient id="cover4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#145C22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C3D17;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <rect x="8" y="6" width="180" height="248" rx="4" fill="rgba(0,0,0,0.15)" />

  <!-- Spine -->
  <rect x="4" y="4" width="14" height="248" rx="3" fill="#0C3D17" />

  <!-- Cover body -->
  <rect x="16" y="4" width="172" height="248" rx="3" fill="url(#cover4)" />

  <!-- Top stripe -->
  <rect x="16" y="4" width="172" height="5" rx="3" fill="#1B7C2E" opacity="0.8"/>

  <!-- Shield / certification icon -->
  <g transform="translate(68, 36)">
    <!-- Shield shape -->
    <path d="M30 4 L56 14 L56 38 C56 52 30 64 30 64 C30 64 4 52 4 38 L4 14 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Check inside shield -->
    <path d="M18 35 L26 43 L42 25" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  </g>

  <!-- LAS-XD badge -->
  <rect x="28" y="118" width="60" height="20" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="58" y="132" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.5">LAS-XD 273</text>

  <!-- Lines decoration -->
  <rect x="26" y="152" width="130" height="1" rx="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="26" y="159" width="100" height="1" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="26" y="166" width="120" height="1" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="26" y="173" width="80" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="26" y="180" width="95" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="26" y="187" width="70" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="26" y="194" width="85" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>

  <!-- PDF badge -->
  <rect x="148" y="118" width="36" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="166" y="132" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">PDF</text>

  <!-- White strip -->
  <rect x="16" y="210" width="172" height="42" rx="0" fill="white" opacity="0.95"/>
  <rect x="16" y="248" width="172" height="4" rx="3" fill="white" opacity="0.95"/>

  <!-- Title -->
  <text x="102" y="225" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#002036" text-anchor="middle" letter-spacing="0.5">NĂNG LỰC PHÒNG THÍ NGHIỆM</text>
  <text x="102" y="237" font-family="Arial, sans-serif" font-size="7.5" fill="#444" text-anchor="middle">Phạm vi công nhận LAS-XD 273</text>
  <text x="102" y="256" font-family="Arial, sans-serif" font-size="7" fill="#145C22" text-anchor="middle" letter-spacing="1" font-weight="bold">CMB • 12/2025</text>
</svg>
