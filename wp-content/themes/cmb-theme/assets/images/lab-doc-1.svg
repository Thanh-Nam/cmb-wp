<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 260" width="196" height="260">
  <defs>
    <linearGradient id="cover1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0379CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#024F87;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spine1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#024F87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0379CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <rect x="8" y="6" width="180" height="248" rx="4" fill="rgba(0,0,0,0.15)" />

  <!-- Spine (left edge) -->
  <rect x="4" y="4" width="14" height="248" rx="3" fill="url(#spine1)" />

  <!-- Book cover body -->
  <rect x="16" y="4" width="172" height="248" rx="3" fill="url(#cover1)" />

  <!-- Top accent bar -->
  <rect x="16" y="4" width="172" height="6" rx="3" fill="rgba(255,255,255,0.25)" />

  <!-- White page strip at bottom -->
  <rect x="16" y="212" width="172" height="40" rx="0" fill="white" opacity="0.95"/>
  <rect x="16" y="248" width="172" height="4" rx="3" fill="white" opacity="0.95"/>

  <!-- Document icon -->
  <g transform="translate(60, 40)">
    <!-- Sheet of paper -->
    <rect x="0" y="0" width="56" height="72" rx="4" fill="white" opacity="0.18"/>
    <rect x="4" y="4" width="48" height="64" rx="3" fill="white" opacity="0.18"/>
    <!-- Folded corner -->
    <path d="M36 4 L48 16 L36 16 Z" fill="rgba(255,255,255,0.35)"/>
    <rect x="36" y="4" width="12" height="12" rx="1" fill="none"/>
    <!-- Lines on paper -->
    <rect x="10" y="24" width="28" height="2" rx="1" fill="white" opacity="0.5"/>
    <rect x="10" y="30" width="24" height="2" rx="1" fill="white" opacity="0.4"/>
    <rect x="10" y="36" width="26" height="2" rx="1" fill="white" opacity="0.4"/>
    <rect x="10" y="42" width="20" height="2" rx="1" fill="white" opacity="0.3"/>
    <rect x="10" y="48" width="22" height="2" rx="1" fill="white" opacity="0.3"/>
  </g>

  <!-- PDF badge -->
  <rect x="26" y="128" width="40" height="20" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="46" y="142" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">PDF</text>

  <!-- Title text on white strip -->
  <text x="102" y="228" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#002036" text-anchor="middle" letter-spacing="0.5">NĂNG LỰC PHÒNG</text>
  <text x="102" y="240" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#002036" text-anchor="middle" letter-spacing="0.5">THÍ NGHIỆM</text>

  <!-- CMB logo text at bottom -->
  <text x="102" y="256" font-family="Arial, sans-serif" font-size="7" fill="#0379CC" text-anchor="middle" letter-spacing="1" font-weight="bold">CMB • 03/2026</text>

  <!-- Horizontal lines decoration on cover -->
  <rect x="26" y="158" width="120" height="1" rx="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="26" y="165" width="90" height="1" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="26" y="172" width="100" height="1" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="26" y="179" width="70" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="26" y="186" width="80" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="26" y="193" width="60" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>
</svg>
