<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A6E"/>
      <stop offset="40%" stop-color="#2C5FA0"/>
      <stop offset="100%" stop-color="#1565A8"/>
    </linearGradient>
    <linearGradient id="sea3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8F00" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF8F00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="480" height="320" fill="url(#sky3)"/>
  <!-- Sunset glow -->
  <ellipse cx="400" cy="160" rx="120" ry="80" fill="url(#sunset)"/>
  <!-- Stars/light dots -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="120" cy="15" r="1" fill="white" opacity="0.6"/>
  <circle cx="200" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="280" cy="10" r="1" fill="white" opacity="0.5"/>
  <circle cx="440" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="170" cy="45" r="1" fill="white" opacity="0.6"/>
  <!-- Horizon glow -->
  <rect x="0" y="175" width="480" height="10" fill="#FF8F00" opacity="0.2"/>
  <!-- Sea -->
  <rect x="0" y="182" width="480" height="138" fill="url(#sea3)"/>
  <!-- Sea shine/reflection -->
  <path d="M350 182 Q400 190 450 182 Q450 200 350 200 Z" fill="#FF8F00" opacity="0.15"/>
  <!-- Sea waves -->
  <path d="M0 200 Q120 194 240 200 Q360 206 480 200" fill="none" stroke="#1976D2" stroke-width="2" opacity="0.5"/>
  <path d="M0 218 Q150 212 300 218 Q380 222 480 218" fill="none" stroke="#1976D2" stroke-width="1.5" opacity="0.4"/>
  <path d="M0 235 Q100 230 200 235 Q320 240 480 235" fill="none" stroke="#1976D2" stroke-width="1" opacity="0.3"/>
  <!-- Large container ship (main) -->
  <path d="M40 175 L440 175 L460 192 L20 192 Z" fill="#263238" opacity="0.95"/>
  <!-- Ship body -->
  <rect x="60" y="145" width="360" height="32" fill="#37474F"/>
  <!-- Ship superstructure -->
  <rect x="280" y="100" width="100" height="47" fill="#455A64"/>
  <rect x="290" y="80" width="70" height="22" fill="#546E7A"/>
  <rect x="310" y="65" width="30" height="17" fill="#607D8B"/>
  <!-- Ship windows -->
  <rect x="298" y="85" width="8" height="6" rx="1" fill="#B0BEC5" opacity="0.8"/>
  <rect x="314" y="85" width="8" height="6" rx="1" fill="#B0BEC5" opacity="0.8"/>
  <rect x="330" y="85" width="8" height="6" rx="1" fill="#B0BEC5" opacity="0.8"/>
  <rect x="346" y="85" width="8" height="6" rx="1" fill="#B0BEC5" opacity="0.8"/>
  <rect x="298" y="97" width="8" height="6" rx="1" fill="#B0BEC5" opacity="0.6"/>
  <rect x="314" y="97" width="8" height="6" rx="1" fill="#B0BEC5" opacity="0.6"/>
  <!-- Mast with flag -->
  <line x1="325" y1="28" x2="325" y2="65" stroke="#90A4AE" stroke-width="2.5"/>
  <rect x="325" y="28" width="22" height="15" fill="#C62828"/>
  <rect x="325" y="30" width="22" height="6" fill="#C62828"/>
  <!-- Antenna/radar -->
  <line x1="340" y1="28" x2="340" y2="15" stroke="#90A4AE" stroke-width="1.5"/>
  <circle cx="340" cy="13" r="3" fill="#90A4AE"/>
  <!-- Containers on ship -->
  <rect x="70" y="135" width="30" height="12" fill="#E53935" rx="1"/>
  <rect x="103" y="135" width="30" height="12" fill="#1E88E5" rx="1"/>
  <rect x="136" y="135" width="30" height="12" fill="#43A047" rx="1"/>
  <rect x="169" y="135" width="30" height="12" fill="#FB8C00" rx="1"/>
  <rect x="202" y="135" width="30" height="12" fill="#1E88E5" rx="1"/>
  <rect x="235" y="135" width="30" height="12" fill="#E53935" rx="1"/>
  <rect x="70" y="122" width="30" height="12" fill="#43A047" rx="1"/>
  <rect x="103" y="122" width="30" height="12" fill="#FB8C00" rx="1"/>
  <rect x="136" y="122" width="30" height="12" fill="#E53935" rx="1"/>
  <rect x="169" y="122" width="30" height="12" fill="#1E88E5" rx="1"/>
  <rect x="202" y="122" width="30" height="12" fill="#43A047" rx="1"/>
  <!-- Ship reflection in water -->
  <rect x="60" y="192" width="360" height="15" fill="#37474F" opacity="0.3"/>
  <path d="M40 192 L440 192 L460 205 L20 205 Z" fill="#263238" opacity="0.2"/>
  <!-- Smaller ship in background -->
  <path d="M0 185 L80 185 L90 192 L-10 192 Z" fill="#455A64" opacity="0.7"/>
  <rect x="0" y="170" width="60" height="16" fill="#546E7A" opacity="0.7"/>
  <rect x="40" y="157" width="25" height="14" fill="#607D8B" opacity="0.7"/>
  <!-- Another ship far right -->
  <polygon points="390,185 480,185 480,192 385,192" fill="#455A64" opacity="0.6"/>
  <!-- Moon/light -->
  <circle cx="55" cy="55" r="20" fill="#FFF9C4" opacity="0.8"/>
  <circle cx="48" cy="50" r="16" fill="#2C5FA0" opacity="0.5"/>
  <!-- Moon glow -->
  <circle cx="55" cy="55" r="30" fill="none" stroke="#FFF9C4" stroke-width="1" opacity="0.3"/>
  <!-- Badge overlay -->
  <rect x="8" y="8" width="95" height="28" fill="#002036" rx="4" opacity="0.9"/>
  <text x="16" y="27" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">HÀNG HẢI</text>
</svg>
