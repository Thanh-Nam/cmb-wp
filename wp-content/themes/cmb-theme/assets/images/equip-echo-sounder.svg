<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" fill="none">
  <!-- Main unit box -->
  <rect x="40" y="30" width="80" height="70" rx="8" fill="#0379CC"/>
  <!-- Screen -->
  <rect x="48" y="38" width="64" height="44" rx="4" fill="#C8E6FA"/>
  <!-- Sonar trace on screen -->
  <polyline points="52,62 60,55 68,68 76,50 84,64 92,58 100,70 108,54" stroke="#0379CC" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Buttons row -->
  <rect x="44" y="108" width="72" height="6" rx="3" fill="#015A99"/>
  <!-- Cable -->
  <path d="M 80 100 Q 80 120 60 128 Q 40 136 48 150" stroke="#015A99" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Transducer (underwater) -->
  <ellipse cx="50" cy="156" rx="20" ry="8" fill="#0379CC"/>
  <ellipse cx="50" cy="153" rx="20" ry="8" fill="#1A8FE3" stroke="#015A99" stroke-width="1.5"/>
  <!-- Sound waves from transducer -->
  <path d="M 35 160 Q 30 168 35 176" stroke="#0379CC" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 42 162 Q 38 170 42 178" stroke="#0379CC" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 50 163 Q 50 171 50 179" stroke="#0379CC" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 58 162 Q 62 170 58 178" stroke="#0379CC" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 65 160 Q 70 168 65 176" stroke="#0379CC" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Power button -->
  <circle cx="114" cy="45" r="7" fill="#015A99"/>
  <path d="M 114 40 L 114 45" stroke="#E0F4FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M 110 42 Q 107 46 109 50 Q 114 54 119 50 Q 121 46 118 42" stroke="#E0F4FF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
