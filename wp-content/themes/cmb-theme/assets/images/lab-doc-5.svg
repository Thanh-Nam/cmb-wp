<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 260" width="196" height="260">
  <defs>
    <linearGradient id="cover5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B5E8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <rect x="8" y="6" width="180" height="248" rx="4" fill="rgba(0,0,0,0.15)" />

  <!-- Spine -->
  <rect x="4" y="4" width="14" height="248" rx="3" fill="#1E3A5F" />

  <!-- Cover body -->
  <rect x="16" y="4" width="172" height="248" rx="3" fill="url(#cover5)" />

  <!-- Top stripe -->
  <rect x="16" y="4" width="172" height="5" rx="3" fill="#4A7AB5" opacity="0.8"/>

  <!-- Soil / layers icon (cross section of earth) -->
  <g transform="translate(30, 40)">
    <!-- Soil layer illustration -->
    <rect x="8" y="0" width="120" height="14" rx="3" fill="rgba(180,140,80,0.5)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <rect x="8" y="17" width="120" height="14" rx="3" fill="rgba(150,110,60,0.45)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <rect x="8" y="34" width="120" height="14" rx="3" fill="rgba(120,90,50,0.4)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <rect x="8" y="51" width="120" height="12" rx="3" fill="rgba(90,70,40,0.35)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <!-- Drill rod -->
    <rect x="66" y="-6" width="4" height="76" rx="1" fill="rgba(255,255,255,0.7)"/>
    <polygon points="68,-6 62,4 74,4" fill="rgba(255,255,255,0.9)"/>
    <!-- Layer labels -->
    <text x="16" y="11" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.7)">Lớp 1</text>
    <text x="16" y="28" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.7)">Lớp 2</text>
    <text x="16" y="45" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.7)">Lớp 3</text>
    <text x="16" y="60" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.7)">Lớp 4</text>
  </g>

  <!-- PDF badge -->
  <rect x="142" y="42" width="36" height="18" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="160" y="55" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">PDF</text>

  <!-- Lines decoration -->
  <rect x="26" y="154" width="130" height="1" rx="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="26" y="161" width="100" height="1" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="26" y="168" width="115" height="1" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="26" y="175" width="85" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="26" y="182" width="95" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="26" y="189" width="75" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="26" y="196" width="90" height="1" rx="1" fill="rgba(255,255,255,0.1)"/>

  <!-- White strip -->
  <rect x="16" y="210" width="172" height="42" rx="0" fill="white" opacity="0.95"/>
  <rect x="16" y="248" width="172" height="4" rx="3" fill="white" opacity="0.95"/>

  <!-- Title -->
  <text x="102" y="226" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#002036" text-anchor="middle" letter-spacing="0.5">BÁO CÁO THÍ NGHIỆM</text>
  <text x="102" y="237" font-family="Arial, sans-serif" font-size="8" fill="#444" text-anchor="middle">Nền đất – Quý IV/2025</text>
  <text x="102" y="256" font-family="Arial, sans-serif" font-size="7" fill="#3B5E8C" text-anchor="middle" letter-spacing="1" font-weight="bold">CMB • 11/2025</text>
</svg>
