<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" fill="none">
  <!-- Arms -->
  <line x1="80" y1="85" x2="30" y2="55" stroke="#0379CC" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="85" x2="130" y2="55" stroke="#0379CC" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="85" x2="30" y2="115" stroke="#0379CC" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="85" x2="130" y2="115" stroke="#0379CC" stroke-width="5" stroke-linecap="round"/>
  <!-- Motor mounts -->
  <circle cx="30" cy="55" r="10" fill="#015A99"/>
  <circle cx="130" cy="55" r="10" fill="#015A99"/>
  <circle cx="30" cy="115" r="10" fill="#015A99"/>
  <circle cx="130" cy="115" r="10" fill="#015A99"/>
  <!-- Propellers -->
  <ellipse cx="30" cy="55" rx="22" ry="5" fill="#0379CC" opacity="0.35" transform="rotate(-30 30 55)"/>
  <ellipse cx="130" cy="55" rx="22" ry="5" fill="#0379CC" opacity="0.35" transform="rotate(30 130 55)"/>
  <ellipse cx="30" cy="115" rx="22" ry="5" fill="#0379CC" opacity="0.35" transform="rotate(30 30 115)"/>
  <ellipse cx="130" cy="115" rx="22" ry="5" fill="#0379CC" opacity="0.35" transform="rotate(-30 130 115)"/>
  <!-- Center body -->
  <rect x="60" y="70" width="40" height="30" rx="8" fill="#0379CC"/>
  <!-- Top dome -->
  <ellipse cx="80" cy="70" rx="22" ry="8" fill="#1A8FE3"/>
  <!-- LEDs -->
  <circle cx="30" cy="55" r="3" fill="#E0F4FF"/>
  <circle cx="130" cy="55" r="3" fill="#E0F4FF"/>
  <circle cx="30" cy="115" r="3" fill="#FFD700" opacity="0.9"/>
  <circle cx="130" cy="115" r="3" fill="#FFD700" opacity="0.9"/>
  <!-- Camera gimbal -->
  <rect x="70" y="100" width="20" height="14" rx="6" fill="#015A99"/>
  <circle cx="80" cy="107" r="6" fill="#C8E6FA" stroke="#015A99" stroke-width="1.5"/>
  <circle cx="80" cy="107" r="3" fill="#0379CC"/>
  <!-- Landing gear -->
  <line x1="66" y1="114" x2="60" y2="130" stroke="#015A99" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="94" y1="114" x2="100" y2="130" stroke="#015A99" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="55" y1="130" x2="68" y2="130" stroke="#015A99" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="92" y1="130" x2="105" y2="130" stroke="#015A99" stroke-width="2.5" stroke-linecap="round"/>
</svg>
