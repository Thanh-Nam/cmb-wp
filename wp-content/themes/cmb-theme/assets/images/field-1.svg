<svg xmlns="http://www.w3.org/2000/svg" width="740" height="920" viewBox="0 0 740 920">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2B4E"/>
      <stop offset="100%" stop-color="#1A5B8A"/>
    </linearGradient>
    <linearGradient id="light1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3A9BD5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D2B4E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="740" height="920" fill="url(#bg1)"/>

  <!-- Grid lines (blueprint style) -->
  <g stroke="#2A7FBF" stroke-width="0.5" opacity="0.25">
    <line x1="0" y1="80" x2="740" y2="80"/>
    <line x1="0" y1="160" x2="740" y2="160"/>
    <line x1="0" y1="240" x2="740" y2="240"/>
    <line x1="0" y1="320" x2="740" y2="320"/>
    <line x1="0" y1="400" x2="740" y2="400"/>
    <line x1="0" y1="480" x2="740" y2="480"/>
    <line x1="0" y1="560" x2="740" y2="560"/>
    <line x1="0" y1="640" x2="740" y2="640"/>
    <line x1="0" y1="720" x2="740" y2="720"/>
    <line x1="0" y1="800" x2="740" y2="800"/>
    <line x1="0" y1="880" x2="740" y2="880"/>
    <line x1="80" y1="0" x2="80" y2="920"/>
    <line x1="160" y1="0" x2="160" y2="920"/>
    <line x1="240" y1="0" x2="240" y2="920"/>
    <line x1="320" y1="0" x2="320" y2="920"/>
    <line x1="400" y1="0" x2="400" y2="920"/>
    <line x1="480" y1="0" x2="480" y2="920"/>
    <line x1="560" y1="0" x2="560" y2="920"/>
    <line x1="640" y1="0" x2="640" y2="920"/>
    <line x1="720" y1="0" x2="720" y2="920"/>
  </g>

  <!-- Blueprint: Floor plan outline -->
  <g fill="none" stroke="#5BB8F5" stroke-width="2" opacity="0.7">
    <!-- Outer walls -->
    <rect x="140" y="120" width="460" height="440" rx="4"/>
    <!-- Inner rooms -->
    <line x1="300" y1="120" x2="300" y2="380"/>
    <line x1="140" y1="260" x2="390" y2="260"/>
    <line x1="390" y1="260" x2="390" y2="560"/>
    <line x1="480" y1="120" x2="480" y2="260"/>
    <!-- Door arcs -->
    <path d="M300 140 Q330 140 330 170" stroke-width="1.5"/>
    <path d="M160 260 Q160 290 190 290" stroke-width="1.5"/>
    <!-- Windows -->
    <line x1="210" y1="120" x2="270" y2="120" stroke-width="4" stroke="#7DCFF7"/>
    <line x1="500" y1="120" x2="560" y2="120" stroke-width="4" stroke="#7DCFF7"/>
    <line x1="600" y1="200" x2="600" y2="320" stroke-width="4" stroke="#7DCFF7"/>
  </g>

  <!-- Gears icon (top-right area) -->
  <g transform="translate(490, 220)" opacity="0.55">
    <circle cx="0" cy="0" r="38" fill="none" stroke="#4AADD6" stroke-width="3"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#4AADD6" stroke-width="3"/>
    <!-- Gear teeth -->
    <rect x="-6" y="-44" width="12" height="12" rx="2" fill="#4AADD6"/>
    <rect x="-6" y="32" width="12" height="12" rx="2" fill="#4AADD6"/>
    <rect x="32" y="-6" width="12" height="12" rx="2" fill="#4AADD6"/>
    <rect x="-44" y="-6" width="12" height="12" rx="2" fill="#4AADD6"/>
    <rect x="22" y="-38" width="12" height="12" rx="2" transform="rotate(45)" fill="#4AADD6"/>
    <rect x="22" y="26" width="12" height="12" rx="2" transform="rotate(-45)" fill="#4AADD6"/>
    <rect x="-34" y="-38" width="12" height="12" rx="2" transform="rotate(-45)" fill="#4AADD6"/>
    <rect x="-34" y="26" width="12" height="12" rx="2" transform="rotate(45)" fill="#4AADD6"/>
    <!-- Small gear -->
    <circle cx="58" cy="42" r="20" fill="none" stroke="#4AADD6" stroke-width="2.5"/>
    <circle cx="58" cy="42" r="10" fill="none" stroke="#4AADD6" stroke-width="2.5"/>
    <rect x="52" y="18" width="12" height="8" rx="1" fill="#4AADD6"/>
    <rect x="52" y="58" width="12" height="8" rx="1" fill="#4AADD6"/>
    <rect x="80" y="36" width="8" height="12" rx="1" fill="#4AADD6"/>
    <rect x="38" y="36" width="8" height="12" rx="1" fill="#4AADD6"/>
  </g>

  <!-- Dimension lines -->
  <g stroke="#7DCFF7" stroke-width="1" opacity="0.5">
    <line x1="140" y1="600" x2="600" y2="600"/>
    <line x1="140" y1="595" x2="140" y2="605"/>
    <line x1="600" y1="595" x2="600" y2="605"/>
    <line x1="700" y1="120" x2="700" y2="560"/>
    <line x1="695" y1="120" x2="705" y2="120"/>
    <line x1="695" y1="560" x2="705" y2="560"/>
  </g>

  <!-- Compass rose -->
  <g transform="translate(90, 680)" opacity="0.6">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#4AADD6" stroke-width="1.5"/>
    <polygon points="0,-28 5,-10 -5,-10" fill="#5BB8F5"/>
    <polygon points="0,28 5,10 -5,10" fill="#2A7FBF"/>
    <polygon points="28,0 10,5 10,-5" fill="#2A7FBF"/>
    <polygon points="-28,0 -10,5 -10,-5" fill="#2A7FBF"/>
    <circle cx="0" cy="0" r="5" fill="#7DCFF7"/>
    <text x="0" y="-34" text-anchor="middle" fill="#7DCFF7" font-size="11" font-family="sans-serif" font-weight="bold">N</text>
  </g>

  <!-- Measurement text -->
  <text x="370" y="625" text-anchor="middle" fill="#7DCFF7" font-size="12" font-family="monospace" opacity="0.6">46.00 m</text>
  <text x="720" y="345" text-anchor="middle" fill="#7DCFF7" font-size="12" font-family="monospace" opacity="0.6" transform="rotate(90,720,345)">44.00 m</text>

  <!-- Light overlay top -->
  <rect width="740" height="300" fill="url(#light1)"/>

  <!-- Subtle vignette -->
  <radialGradient id="vig1" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
  </radialGradient>
  <rect width="740" height="920" fill="url(#vig1)"/>
</svg>
