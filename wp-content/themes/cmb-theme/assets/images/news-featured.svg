<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="nf-bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#A80018"/>
      <stop offset="55%" stop-color="#C4001E"/>
      <stop offset="100%" stop-color="#8B0012"/>
    </linearGradient>
    <linearGradient id="nf-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A0010"/>
      <stop offset="100%" stop-color="#3E0008"/>
    </linearGradient>
    <linearGradient id="nf-light" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="rgba(255,220,180,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,220,180,0)"/>
    </linearGradient>
    <radialGradient id="nf-spot" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="rgba(255,210,160,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,210,160,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#nf-bg)"/>
  <rect width="800" height="480" fill="url(#nf-spot)"/>

  <!-- Stage backdrop panel -->
  <rect x="40" y="20" width="720" height="240" fill="rgba(0,0,0,0.22)" rx="4"/>

  <!-- Backdrop: VIMC logo area -->
  <circle cx="180" cy="120" r="68" fill="rgba(0,0,0,0.25)"/>
  <circle cx="180" cy="120" r="56" fill="none" stroke="rgba(255,215,0,0.55)" stroke-width="3"/>
  <circle cx="180" cy="120" r="42" fill="rgba(255,215,0,0.08)"/>
  <text x="180" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="rgba(255,215,0,0.8)">VIMC</text>
  <text x="180" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,215,0,0.5)">TỔNG CÔNG TY HÀNG HẢI</text>

  <!-- Banner text lines -->
  <rect x="280" y="60" width="440" height="22" fill="rgba(255,215,0,0.55)" rx="3"/>
  <rect x="280" y="92" width="380" height="14" fill="rgba(255,215,0,0.35)" rx="3"/>
  <rect x="280" y="115" width="400" height="14" fill="rgba(255,215,0,0.3)" rx="3"/>
  <rect x="280" y="138" width="340" height="14" fill="rgba(255,215,0,0.25)" rx="3"/>
  <rect x="280" y="161" width="360" height="14" fill="rgba(255,215,0,0.2)" rx="3"/>
  <rect x="280" y="184" width="300" height="14" fill="rgba(255,215,0,0.15)" rx="3"/>

  <!-- Floor -->
  <rect y="310" width="800" height="170" fill="url(#nf-floor)"/>
  <rect y="310" width="800" height="3" fill="rgba(255,150,150,0.25)"/>

  <!-- People silhouettes (6 figures) -->
  <!-- Person far left -->
  <ellipse cx="160" cy="292" rx="18" ry="18" fill="rgba(10,10,30,0.82)"/>
  <path d="M143 310 Q160 304 177 310 L180 370 L140 370 Z" fill="rgba(10,10,30,0.82)"/>

  <!-- Person 2 -->
  <ellipse cx="240" cy="287" rx="20" ry="20" fill="rgba(15,15,40,0.85)"/>
  <path d="M221 307 Q240 300 259 307 L263 370 L217 370 Z" fill="rgba(15,15,40,0.85)"/>

  <!-- Person 3 (center-left, slightly forward) -->
  <ellipse cx="320" cy="282" rx="22" ry="22" fill="rgba(5,5,20,0.88)"/>
  <path d="M299 304 Q320 296 341 304 L346 375 L294 375 Z" fill="rgba(5,5,20,0.88)"/>

  <!-- Person 4 (center, main) -->
  <ellipse cx="400" cy="279" rx="24" ry="24" fill="rgba(5,5,20,0.9)"/>
  <path d="M377 303 Q400 294 423 303 L429 375 L371 375 Z" fill="rgba(5,5,20,0.9)"/>

  <!-- Person 5 -->
  <ellipse cx="480" cy="282" rx="22" ry="22" fill="rgba(10,10,35,0.87)"/>
  <path d="M459 304 Q480 297 501 304 L505 375 L455 375 Z" fill="rgba(10,10,35,0.87)"/>

  <!-- Person 6 -->
  <ellipse cx="555" cy="287" rx="20" ry="20" fill="rgba(15,15,40,0.83)"/>
  <path d="M536 307 Q555 301 574 307 L577 370 L533 370 Z" fill="rgba(15,15,40,0.83)"/>

  <!-- Person far right -->
  <ellipse cx="625" cy="293" rx="17" ry="17" fill="rgba(10,10,30,0.78)"/>
  <path d="M609 310 Q625 305 641 310 L644 370 L606 370 Z" fill="rgba(10,10,30,0.78)"/>

  <!-- Award/certificate being presented (golden) -->
  <rect x="374" y="344" width="52" height="36" fill="rgba(255,215,0,0.65)" rx="3"/>
  <rect x="378" y="348" width="44" height="28" fill="rgba(255,215,0,0.3)" rx="2"/>

  <!-- Red flag left & right (flag poles) -->
  <rect x="58" y="20" width="6" height="240" fill="rgba(0,0,0,0.4)"/>
  <rect x="736" y="20" width="6" height="240" fill="rgba(0,0,0,0.4)"/>
  <rect x="58" y="20" width="50" height="80" fill="rgba(220,0,20,0.7)"/>
  <rect x="736" y="20" width="50" height="80" fill="rgba(220,0,20,0.7)"/>

  <!-- Ambient light overlay -->
  <rect width="800" height="480" fill="url(#nf-light)"/>

  <!-- Bottom vignette -->
  <rect y="380" width="800" height="100" fill="rgba(0,0,0,0.35)"/>
</svg>
