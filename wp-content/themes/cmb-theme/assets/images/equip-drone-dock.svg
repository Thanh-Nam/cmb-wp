<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" fill="none">
  <!-- Base platform -->
  <rect x="20" y="130" width="120" height="16" rx="4" fill="#015A99"/>
  <!-- Station body -->
  <rect x="30" y="72" width="100" height="60" rx="8" fill="#0379CC"/>
  <!-- Open lid (left side) -->
  <path d="M 30 72 L 30 52 L 80 52 L 80 72" fill="#1A8FE3" stroke="#015A99" stroke-width="1.5"/>
  <!-- Open lid (right side) -->
  <path d="M 80 72 L 80 52 L 130 52 L 130 72" fill="#1A8FE3" stroke="#015A99" stroke-width="1.5"/>
  <!-- Hinge line -->
  <line x1="30" y1="72" x2="130" y2="72" stroke="#015A99" stroke-width="2"/>
  <!-- Interior landing pad -->
  <rect x="42" y="80" width="76" height="44" rx="4" fill="#015A99"/>
  <!-- Landing pad markings -->
  <circle cx="80" cy="102" r="22" fill="none" stroke="#1A8FE3" stroke-width="2" stroke-dasharray="5 4"/>
  <circle cx="80" cy="102" r="8" fill="none" stroke="#E0F4FF" stroke-width="2"/>
  <line x1="80" y1="88" x2="80" y2="116" stroke="#E0F4FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="66" y1="102" x2="94" y2="102" stroke="#E0F4FF" stroke-width="1.5" opacity="0.6"/>
  <!-- Mini drone inside (parked) -->
  <rect x="70" y="95" width="20" height="14" rx="4" fill="#C8E6FA"/>
  <line x1="72" y1="100" x2="62" y2="95" stroke="#0379CC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="100" x2="98" y2="95" stroke="#0379CC" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="62" cy="95" r="4" fill="#0379CC"/>
  <circle cx="98" cy="95" r="4" fill="#0379CC"/>
  <!-- Status LEDs on front -->
  <circle cx="46" cy="118" r="3.5" fill="#00CC66"/>
  <circle cx="56" cy="118" r="3.5" fill="#00CC66"/>
  <circle cx="66" cy="118" r="3.5" fill="#FFB300"/>
  <!-- Ventilation grills -->
  <line x1="100" y1="110" x2="120" y2="110" stroke="#015A99" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="115" x2="120" y2="115" stroke="#015A99" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="120" x2="120" y2="120" stroke="#015A99" stroke-width="1.5" opacity="0.5"/>
  <!-- Power cable -->
  <path d="M 20 140 Q 10 140 10 130 Q 10 120 20 120" stroke="#015A99" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
