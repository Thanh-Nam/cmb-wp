<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" fill="none">
  <!-- Tripod legs -->
  <line x1="80" y1="108" x2="28" y2="162" stroke="#0379CC" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="108" x2="80" y2="166" stroke="#0379CC" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="108" x2="132" y2="162" stroke="#0379CC" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="28" cy="164" r="5" fill="#0379CC"/>
  <circle cx="80" cy="168" r="5" fill="#0379CC"/>
  <circle cx="132" cy="164" r="5" fill="#0379CC"/>
  <!-- Head plate -->
  <ellipse cx="80" cy="106" rx="20" ry="5.5" fill="#015A99"/>
  <!-- Level body (cylinder - wider, horizontal) -->
  <rect x="36" y="76" width="88" height="28" rx="14" fill="#0379CC"/>
  <!-- Lens left -->
  <ellipse cx="38" cy="90" rx="8" ry="8" fill="#E0F4FF" stroke="#015A99" stroke-width="1.5"/>
  <circle cx="38" cy="90" r="3.5" fill="#0379CC"/>
  <!-- Lens right -->
  <ellipse cx="122" cy="90" rx="8" ry="8" fill="#E0F4FF" stroke="#015A99" stroke-width="1.5"/>
  <circle cx="122" cy="90" r="3.5" fill="#0379CC"/>
  <!-- Top knob -->
  <rect x="71" y="66" width="18" height="10" rx="3" fill="#015A99"/>
  <!-- Level vial bubble on top -->
  <ellipse cx="80" cy="72" rx="14" ry="4" fill="none" stroke="#015A99" stroke-width="1.5"/>
  <ellipse cx="80" cy="72" rx="4" ry="2.5" fill="#C8E6FA"/>
  <!-- Focusing knob -->
  <ellipse cx="80" cy="104" rx="10" ry="4" fill="#1A8FE3"/>
</svg>
