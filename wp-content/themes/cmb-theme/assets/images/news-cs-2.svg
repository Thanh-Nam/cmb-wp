<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1A3A6E"/>
    </linearGradient>
    <linearGradient id="glowBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0379CC" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="480" height="320" fill="url(#bgGrad2)"/>
  <!-- Grid lines (digital/tech feel) -->
  <line x1="0" y1="80" x2="480" y2="80" stroke="#0379CC" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="160" x2="480" y2="160" stroke="#0379CC" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="240" x2="480" y2="240" stroke="#0379CC" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="0" x2="120" y2="320" stroke="#0379CC" stroke-width="0.5" opacity="0.3"/>
  <line x1="240" y1="0" x2="240" y2="320" stroke="#0379CC" stroke-width="0.5" opacity="0.3"/>
  <line x1="360" y1="0" x2="360" y2="320" stroke="#0379CC" stroke-width="0.5" opacity="0.3"/>
  <!-- Central hub circle -->
  <circle cx="240" cy="160" r="70" fill="none" stroke="#0379CC" stroke-width="2" opacity="0.6"/>
  <circle cx="240" cy="160" r="50" fill="none" stroke="#00BCD4" stroke-width="1.5" opacity="0.5"/>
  <circle cx="240" cy="160" r="30" fill="url(#glowBlue)" opacity="0.7"/>
  <circle cx="240" cy="160" r="15" fill="#0379CC"/>
  <!-- Ship icon in center -->
  <path d="M232 160 L240 152 L248 160 L244 168 L236 168 Z" fill="white"/>
  <!-- Connection nodes -->
  <circle cx="100" cy="80" r="12" fill="#0379CC" opacity="0.8" filter="url(#glow)"/>
  <circle cx="380" cy="80" r="12" fill="#00BCD4" opacity="0.8" filter="url(#glow)"/>
  <circle cx="60" cy="200" r="12" fill="#0379CC" opacity="0.8" filter="url(#glow)"/>
  <circle cx="420" cy="200" r="12" fill="#00BCD4" opacity="0.8" filter="url(#glow)"/>
  <circle cx="160" cy="260" r="12" fill="#0379CC" opacity="0.7" filter="url(#glow)"/>
  <circle cx="320" cy="260" r="12" fill="#00BCD4" opacity="0.7" filter="url(#glow)"/>
  <circle cx="140" cy="60" r="8" fill="#26C6DA" opacity="0.6"/>
  <circle cx="350" cy="250" r="8" fill="#26C6DA" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="100" y1="80" x2="195" y2="140" stroke="#0379CC" stroke-width="1.5" opacity="0.6"/>
  <line x1="380" y1="80" x2="285" y2="140" stroke="#00BCD4" stroke-width="1.5" opacity="0.6"/>
  <line x1="60" y1="200" x2="175" y2="170" stroke="#0379CC" stroke-width="1.5" opacity="0.6"/>
  <line x1="420" y1="200" x2="305" y2="170" stroke="#00BCD4" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="260" x2="220" y2="205" stroke="#0379CC" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="260" x2="260" y2="205" stroke="#00BCD4" stroke-width="1" opacity="0.5"/>
  <!-- Small node icons -->
  <rect x="90" y="70" width="20" height="20" rx="4" fill="none" stroke="#0379CC" stroke-width="1.5"/>
  <text x="96" y="84" font-family="Arial" font-size="10" fill="#0379CC">📦</text>
  <rect x="370" y="70" width="20" height="20" rx="4" fill="none" stroke="#00BCD4" stroke-width="1.5"/>
  <!-- Data packets (dots on lines) -->
  <circle cx="148" cy="110" r="4" fill="#00BCD4"/>
  <circle cx="333" cy="110" r="4" fill="#0379CC"/>
  <circle cx="108" cy="185" r="4" fill="#26C6DA"/>
  <circle cx="363" cy="185" r="4" fill="#0379CC"/>
  <!-- Floating data labels -->
  <rect x="30" y="100" width="55" height="18" rx="4" fill="#0379CC" opacity="0.7"/>
  <text x="38" y="113" font-family="Arial" font-size="9" fill="white">AI Route</text>
  <rect x="395" y="130" width="65" height="18" rx="4" fill="#00BCD4" opacity="0.7"/>
  <text x="402" y="143" font-family="Arial" font-size="9" fill="white">IoT Sensor</text>
  <rect x="45" y="235" width="65" height="18" rx="4" fill="#0379CC" opacity="0.7"/>
  <text x="52" y="248" font-family="Arial" font-size="9" fill="white">Big Data</text>
  <rect x="370" y="235" width="70" height="18" rx="4" fill="#00BCD4" opacity="0.7"/>
  <text x="377" y="248" font-family="Arial" font-size="9" fill="white">Blockchain</text>
  <!-- Badge overlay -->
  <rect x="8" y="8" width="110" height="28" fill="#0379CC" rx="4" opacity="0.9"/>
  <text x="16" y="27" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">LOGISTICS</text>
</svg>
