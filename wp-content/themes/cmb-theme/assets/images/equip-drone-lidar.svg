<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" fill="none">
  <!-- Arms -->
  <line x1="80" y1="80" x2="28" y2="52" stroke="#0379CC" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="80" x2="132" y2="52" stroke="#0379CC" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="80" x2="28" y2="108" stroke="#0379CC" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="80" x2="132" y2="108" stroke="#0379CC" stroke-width="5" stroke-linecap="round"/>
  <!-- Motor mounts -->
  <circle cx="28" cy="52" r="10" fill="#015A99"/>
  <circle cx="132" cy="52" r="10" fill="#015A99"/>
  <circle cx="28" cy="108" r="10" fill="#015A99"/>
  <circle cx="132" cy="108" r="10" fill="#015A99"/>
  <!-- Propellers -->
  <ellipse cx="28" cy="52" rx="22" ry="5" fill="#0379CC" opacity="0.35" transform="rotate(-30 28 52)"/>
  <ellipse cx="132" cy="52" rx="22" ry="5" fill="#0379CC" opacity="0.35" transform="rotate(30 132 52)"/>
  <ellipse cx="28" cy="108" rx="22" ry="5" fill="#0379CC" opacity="0.35" transform="rotate(30 28 108)"/>
  <ellipse cx="132" cy="108" rx="22" ry="5" fill="#0379CC" opacity="0.35" transform="rotate(-30 132 108)"/>
  <!-- Center body -->
  <rect x="58" y="65" width="44" height="30" rx="8" fill="#0379CC"/>
  <ellipse cx="80" cy="65" rx="24" ry="8" fill="#1A8FE3"/>
  <!-- LiDAR sensor (round dome) -->
  <rect x="64" y="95" width="32" height="8" rx="3" fill="#015A99"/>
  <ellipse cx="80" cy="110" rx="20" ry="18" fill="#1A8FE3" stroke="#015A99" stroke-width="2"/>
  <ellipse cx="80" cy="108" rx="14" ry="12" fill="#C8E6FA"/>
  <!-- LiDAR scan lines -->
  <line x1="80" y1="108" x2="60" y2="130" stroke="#0379CC" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="108" x2="70" y2="133" stroke="#0379CC" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="108" x2="80" y2="134" stroke="#0379CC" stroke-width="1.5" opacity="0.7"/>
  <line x1="80" y1="108" x2="90" y2="133" stroke="#0379CC" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="108" x2="100" y2="130" stroke="#0379CC" stroke-width="1.5" opacity="0.5"/>
  <!-- LED indicators -->
  <circle cx="28" cy="52" r="3" fill="#E0F4FF"/>
  <circle cx="132" cy="52" r="3" fill="#E0F4FF"/>
</svg>
