<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8D9F5"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
    <linearGradient id="sea1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565A8"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="480" height="320" fill="url(#sky1)"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="50" rx="50" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="110" cy="44" rx="35" ry="14" fill="white" opacity="0.9"/>
  <ellipse cx="350" cy="65" rx="40" ry="15" fill="white" opacity="0.7"/>
  <ellipse cx="380" cy="58" rx="30" ry="12" fill="white" opacity="0.8"/>
  <!-- Sea -->
  <rect x="0" y="200" width="480" height="120" fill="url(#sea1)"/>
  <!-- Sea waves -->
  <path d="M0 210 Q60 205 120 210 Q180 215 240 210 Q300 205 360 210 Q420 215 480 210" fill="none" stroke="#1976D2" stroke-width="2" opacity="0.5"/>
  <path d="M0 225 Q80 220 160 225 Q240 230 320 225 Q400 220 480 225" fill="none" stroke="#1976D2" stroke-width="1.5" opacity="0.4"/>
  <!-- Port ground -->
  <rect x="0" y="185" width="480" height="20" fill="#546E7A"/>
  <!-- Cranes -->
  <!-- Crane 1 -->
  <rect x="60" y="60" width="6" height="130" fill="#607D8B"/>
  <rect x="20" y="60" width="86" height="6" fill="#607D8B"/>
  <line x1="63" y1="66" x2="63" y2="145" stroke="#455A64" stroke-width="1"/>
  <rect x="55" y="140" width="20" height="8" fill="#455A64" rx="2"/>
  <!-- Crane cable -->
  <line x1="90" y1="63" x2="82" y2="125" stroke="#90A4AE" stroke-width="1.5"/>
  <rect x="76" y="122" width="12" height="8" fill="#78909C"/>
  <!-- Crane 2 -->
  <rect x="200" y="40" width="6" height="150" fill="#607D8B"/>
  <rect x="155" y="40" width="96" height="6" fill="#607D8B"/>
  <line x1="203" y1="46" x2="203" y2="165" stroke="#455A64" stroke-width="1"/>
  <rect x="194" y="158" width="22" height="9" fill="#455A64" rx="2"/>
  <line x1="235" y1="43" x2="225" y2="110" stroke="#90A4AE" stroke-width="1.5"/>
  <rect x="218" y="107" width="14" height="8" fill="#78909C"/>
  <!-- Crane 3 -->
  <rect x="370" y="70" width="6" height="120" fill="#607D8B"/>
  <rect x="330" y="70" width="80" height="6" fill="#607D8B"/>
  <line x1="373" y1="76" x2="373" y2="155" stroke="#455A64" stroke-width="1"/>
  <rect x="365" y="148" width="18" height="8" fill="#455A64" rx="2"/>
  <line x1="398" y1="73" x2="390" y2="130" stroke="#90A4AE" stroke-width="1.5"/>
  <rect x="383" y="127" width="14" height="8" fill="#78909C"/>
  <!-- Containers stacked -->
  <rect x="10" y="158" width="42" height="28" fill="#E53935" rx="1"/>
  <rect x="10" y="130" width="42" height="28" fill="#1E88E5" rx="1"/>
  <rect x="54" y="158" width="42" height="28" fill="#43A047" rx="1"/>
  <rect x="54" y="130" width="42" height="28" fill="#FB8C00" rx="1"/>
  <rect x="98" y="158" width="42" height="28" fill="#1E88E5" rx="1"/>
  <rect x="140" y="158" width="42" height="28" fill="#E53935" rx="1"/>
  <rect x="140" y="130" width="42" height="28" fill="#43A047" rx="1"/>
  <!-- Green elements (eco) -->
  <circle cx="420" cy="130" r="22" fill="#4CAF50" opacity="0.9"/>
  <circle cx="450" cy="145" r="15" fill="#2E7D32" opacity="0.8"/>
  <!-- Green leaf icon -->
  <path d="M420 118 Q430 108 440 118 Q440 130 420 130 Z" fill="#A5D6A7"/>
  <!-- Solar panel -->
  <rect x="280" y="155" width="60" height="32" fill="#1A237E" rx="2"/>
  <line x1="300" y1="155" x2="300" y2="187" stroke="#3F51B5" stroke-width="1"/>
  <line x1="320" y1="155" x2="320" y2="187" stroke="#3F51B5" stroke-width="1"/>
  <line x1="340" y1="155" x2="340" y2="187" stroke="#3F51B5" stroke-width="1"/>
  <line x1="280" y1="171" x2="340" y2="171" stroke="#3F51B5" stroke-width="1"/>
  <!-- Ship silhouette -->
  <path d="M100 195 L380 195 L400 210 L80 210 Z" fill="#37474F"/>
  <rect x="170" y="170" width="140" height="28" fill="#455A64"/>
  <rect x="200" y="148" width="80" height="25" fill="#546E7A"/>
  <rect x="225" y="132" width="30" height="18" fill="#607D8B"/>
  <!-- Ship flag/mast -->
  <line x1="240" y1="80" x2="240" y2="132" stroke="#90A4AE" stroke-width="2"/>
  <rect x="240" y="80" width="18" height="12" fill="#C62828"/>
  <!-- Water ripple around ship -->
  <path d="M80 210 Q240 205 400 210" fill="none" stroke="#1565A8" stroke-width="3" opacity="0.6"/>
  <!-- Green badge overlay -->
  <rect x="8" y="8" width="100" height="28" fill="url(#greenGrad)" rx="4"/>
  <text x="18" y="27" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">CẢNG XANH</text>
</svg>
