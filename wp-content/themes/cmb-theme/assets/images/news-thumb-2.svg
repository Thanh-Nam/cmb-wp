<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" width="360" height="240">
  <defs>
    <linearGradient id="nt2-bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0C3554"/>
      <stop offset="50%" stop-color="#0F4A7A"/>
      <stop offset="100%" stop-color="#082A44"/>
    </linearGradient>
    <linearGradient id="nt2-table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A5E8A"/>
      <stop offset="100%" stop-color="#0A3A58"/>
    </linearGradient>
    <radialGradient id="nt2-amb" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(80,170,240,0.18)"/>
      <stop offset="100%" stop-color="rgba(80,170,240,0)"/>
    </radialGradient>
  </defs>

  <!-- Room background -->
  <rect width="360" height="240" fill="url(#nt2-bg)"/>
  <rect width="360" height="240" fill="url(#nt2-amb)"/>

  <!-- Back wall / projection screen -->
  <rect x="50" y="25" width="260" height="130" fill="rgba(255,255,255,0.08)" rx="3"/>
  <rect x="58" y="32" width="244" height="116" fill="rgba(255,255,255,0.06)" rx="2"/>

  <!-- Projected slide on screen (light beam) -->
  <rect x="62" y="35" width="236" height="110" fill="rgba(200,230,255,0.1)" rx="2"/>
  <!-- Slide content lines -->
  <rect x="80" y="48" width="160" height="12" fill="rgba(255,255,255,0.2)" rx="2"/>
  <rect x="80" y="68" width="120" height="8" fill="rgba(255,255,255,0.12)" rx="2"/>
  <rect x="80" y="84" width="140" height="8" fill="rgba(255,255,255,0.1)" rx="2"/>
  <rect x="80" y="100" width="100" height="8" fill="rgba(255,255,255,0.1)" rx="2"/>
  <!-- Chart bars on slide -->
  <rect x="210" y="60" width="18" height="75" fill="rgba(100,180,255,0.3)" rx="2"/>
  <rect x="233" y="75" width="18" height="60" fill="rgba(100,200,255,0.25)" rx="2"/>
  <rect x="256" y="88" width="18" height="47" fill="rgba(100,180,255,0.2)" rx="2"/>

  <!-- Conference table (horizontal, trapezoid perspective) -->
  <polygon points="60,175 300,175 280,220 80,220" fill="url(#nt2-table)"/>
  <polygon points="60,175 300,175 300,178 60,178" fill="rgba(255,255,255,0.15)"/>

  <!-- Seated people around table (top view suggestion) -->
  <!-- Person 1 (left of table) -->
  <ellipse cx="115" cy="168" rx="13" ry="13" fill="rgba(5,15,45,0.88)"/>
  <rect x="103" y="175" width="24" height="28" fill="rgba(5,15,45,0.82)" rx="2"/>
  <!-- Person 2 -->
  <ellipse cx="165" cy="165" rx="13" ry="13" fill="rgba(10,20,50,0.85)"/>
  <rect x="153" y="172" width="24" height="30" fill="rgba(10,20,50,0.8)" rx="2"/>
  <!-- Person 3 (center / speaker) -->
  <ellipse cx="215" cy="163" rx="15" ry="15" fill="rgba(5,10,40,0.9)"/>
  <rect x="201" y="170" width="28" height="32" fill="rgba(5,10,40,0.85)" rx="2"/>
  <!-- Person 4 -->
  <ellipse cx="265" cy="165" rx="13" ry="13" fill="rgba(10,20,50,0.85)"/>
  <rect x="253" y="172" width="24" height="30" fill="rgba(10,20,50,0.8)" rx="2"/>

  <!-- Microphones on table -->
  <rect x="142" y="172" width="4" height="15" fill="rgba(200,200,200,0.4)" rx="1"/>
  <ellipse cx="144" cy="171" rx="5" ry="4" fill="rgba(200,200,200,0.3)"/>
  <rect x="192" y="170" width="4" height="15" fill="rgba(200,200,200,0.4)" rx="1"/>
  <ellipse cx="194" cy="169" rx="5" ry="4" fill="rgba(200,200,200,0.3)"/>
  <rect x="242" y="172" width="4" height="15" fill="rgba(200,200,200,0.4)" rx="1"/>
  <ellipse cx="244" cy="171" rx="5" ry="4" fill="rgba(200,200,200,0.3)"/>

  <!-- Documents/papers on table -->
  <rect x="108" y="183" width="22" height="14" fill="rgba(255,255,255,0.15)" rx="1" transform="rotate(-3 108 183)"/>
  <rect x="158" y="181" width="22" height="14" fill="rgba(255,255,255,0.12)" rx="1" transform="rotate(2 158 181)"/>

  <!-- Ambient light / vignette -->
  <rect width="360" height="240" fill="rgba(0,0,30,0.2)"/>
</svg>
